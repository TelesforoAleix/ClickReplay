; ClickReplay configuration file.
; Copy this file to "config.ini" (next to the program or in
; %APPDATA%\ClickReplay\) and edit the values. Re-run ClickReplay to apply.
; Any value you leave out falls back to the built-in default.

[recording]
; Keys use pynput's hotkey format, e.g. <f9>, <f10>, <ctrl>+<f9>.
stop_hotkey = <f9>
waypoint_hotkey = <f10>

[playback]
; Speed multiplier: 1.0 = real time, 2.0 = twice as fast, 0.5 = half speed.
speed = 1.0
; Seconds counted down before playback (and CLI recording) begins.
countdown = 3
; "Point-stop" dwell: seconds to pause after each click, drag release, or
; waypoint so viewers can follow along. Set to 0 to disable. This pause is
; NOT affected by the speed multiplier.
point_stop_seconds = 1.0
; Mouse easing — any pyautogui tween name (linear, easeInOutQuad, ...).
easing = easeInOutQuad
; Clamp for synthesised mouse-move animation length, in seconds.
min_move_duration = 0.05
max_move_duration = 2.0
; Monitor index used when none is given (see "clickreplay monitors").
default_monitor = 0

[output]
; Folder where new recordings are saved by default.
directory = output
